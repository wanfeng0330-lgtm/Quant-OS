[tool.uv.workspace]
members = [
    "apps/api",
    "packages/shared",
    "packages/domain-market",
    "packages/domain-factor",
    "packages/domain-strategy",
    "packages/domain-agent",
    "packages/app-market",
    "packages/app-factor",
    "packages/app-backtest",
    "packages/app-agent",
    "packages/infra-market",
    "packages/infra-factor",
    "packages/infra-strategy",
    "packages/infra-agent",
]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
