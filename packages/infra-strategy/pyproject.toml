[project]
name = "quant-os-infra-strategy"
version = "0.1.0"
description = "AI Quant Research OS - Strategy infrastructure"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy[asyncio]>=2.0.30",
    "numpy>=2.0.0",
    "pandas>=2.2.0",
    "quant-os-domain-strategy",
    "quant-os-shared",
]

[tool.uv.sources]
quant-os-domain-strategy = { workspace = true }
quant-os-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/quant_os_infra_strategy"]
