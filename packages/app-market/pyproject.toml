[project]
name = "quant-os-app-market"
version = "0.1.0"
description = "AI Quant Research OS - Market application"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.10.0",
    "quant-os-domain-market",
    "quant-os-shared",
]

[tool.uv.sources]
quant-os-domain-market = { workspace = true }
quant-os-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/quant_os_app_market"]
