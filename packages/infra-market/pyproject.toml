[project]
name = "quant-os-infra-market"
version = "0.1.0"
description = "AI Quant Research OS - Market infrastructure"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy[asyncio]>=2.0.30",
    "pandas>=2.2.0",
    "akshare>=1.15.0",
    "redis>=5.0.0",
    "quant-os-domain-market",
    "quant-os-shared",
]

[tool.uv.sources]
quant-os-domain-market = { workspace = true }
quant-os-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/quant_os_infra_market"]
