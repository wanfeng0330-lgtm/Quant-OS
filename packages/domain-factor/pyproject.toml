[project]
name = "quant-os-domain-factor"
version = "0.1.0"
description = "AI Quant Research OS - Factor domain"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.10.0",
    "numpy>=2.0.0",
    "pandas>=2.2.0",
    "quant-os-shared",
]

[tool.uv.sources]
quant-os-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/quant_os_domain_factor"]
