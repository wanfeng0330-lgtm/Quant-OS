[project]
name = "quant-os-infra-agent"
version = "0.1.0"
description = "AI Quant Research OS - Agent infrastructure"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy[asyncio]>=2.0.30",
    "httpx>=0.28.0",
    "openai>=1.58.0",
    "anthropic>=0.42.0",
    "qdrant-client>=1.12.0",
    "quant-os-domain-agent",
    "quant-os-shared",
]

[tool.uv.sources]
quant-os-domain-agent = { workspace = true }
quant-os-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/quant_os_infra_agent"]
