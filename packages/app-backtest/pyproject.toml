[project]
name = "quant-os-app-backtest"
version = "0.1.0"
description = "AI Quant Research OS - Backtest application"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.10.0",
    "pandas>=2.2.0",
    "numpy>=2.0.0",
    "quant-os-domain-strategy",
    "quant-os-shared",
    "quant-os-infra-strategy",
    "quant-os-infra-market",
]

[tool.uv.sources]
quant-os-domain-strategy = { workspace = true }
quant-os-shared = { workspace = true }
quant-os-infra-strategy = { workspace = true }
quant-os-infra-market = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/quant_os_app_backtest"]
